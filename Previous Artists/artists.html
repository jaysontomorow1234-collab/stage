<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Artists - UJ Events</title>
    <link rel="stylesheet" href="artists.css">
    <link rel="icon" type="image/x-icon" href="images_artists/favicon/favicon.ico">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
            <img src="images_artists/UJ_Events_Logo.jpg" 
            alt="UJ Events Logo" class="reveal"
            width="100px" height="100px">
            </div>

            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li> 
                <li><a href="artists.html" class="active">Artists</a></li>
                <li><a href="../index.html#about">About Us</a></li>
                <li><a href="../index.html#tickets">Tickets</a></li>
            </ul>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>

        </nav>
    </header>

    <main>
        <section class="artists-header">
            <h1 class="reveal">Our Past Artists</h1>
            <p class="reveal">A legacy of bringing the best African talent to the stage</p>
        </section>

        <section class="artists-container">
            <div class="artists-grid">
                <div class="artist-card reveal">
                    <div class="artist-image">
                        <img src="images_artists/placeholder1.jpg" alt="Artist Name">
                    </div>
                    <div class="artist-info">
                        <h3>Artist Name</h3>
                        <p>Live in Amsterdam</p>
                    </div>
                </div>

                <div class="artist-card reveal">
                    <div class="artist-image">
                        <img src="images_artists/placeholder2.jpg" alt="Artist Name">
                    </div>
                    <div class="artist-info">
                        <h3>Artist Name</h3>
                        <p>Live in Brussels</p>
                    </div>
                </div>

                <div class="artist-card reveal">
                    <div class="artist-image">
                        <img src="images_artists/placeholder3.jpg" alt="Artist Name">
                    </div>
                    <div class="artist-info">
                        <h3>Artist Name</h3>
                        <p>Special Event</p>
                    </div>
                </div>
                
                <div class="artist-card reveal">
                    <div class="artist-image">
                        <img src="images_artists/dj_night_1.jpg" alt="Amapiano Night">
                    </div>
                    <div class="artist-info">
                        <h3>Amapiano Vibes</h3> <p>DJ Set - Brussels</p> </div>
                </div>
        </section>
    </main>

    <script src="artists.js"></script>
</body>
</html>
